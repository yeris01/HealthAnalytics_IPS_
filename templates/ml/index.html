{% extends 'base.html' %}

{% block title %}Machine Learning - HealthAnalytics IPS{% endblock %}

{% block page_title %}
<i class="bi bi-cpu me-2 text-primary"></i>Machine Learning
{% endblock %}

{% block content %}

<div class="card shadow-sm border-0">
    <div class="card-body">

        <h3 class="mb-3">Predicción de Riesgo Clínico</h3>

        <p class="text-muted">
            Entrena el modelo y genera predicciones para todos los pacientes.
        </p>

        <button id="btnEntrenar" class="btn btn-primary">
            <i class="bi bi-play-fill"></i>
            Entrenar Modelo
        </button>

        <button id="btnPredecir" class="btn btn-success ms-2">
            <i class="bi bi-graph-up"></i>
            Predecir Todos
        </button>

        <hr>

        <div id="resultado"></div>

    </div>
</div>

<script>

function getCookie(name) {
    let cookieValue = null;

    if (document.cookie && document.cookie !== '') {

        const cookies = document.cookie.split(';');

        for (let i = 0; i < cookies.length; i++) {

            const cookie = cookies[i].trim();

            if (cookie.substring(0, name.length + 1) === (name + '=')) {

                cookieValue = decodeURIComponent(
                    cookie.substring(name.length + 1)
                );

                break;
            }
        }
    }

    return cookieValue;
}

const csrftoken = getCookie('csrftoken');

const resultado = document.getElementById('resultado');


// ===============================
// ENTRENAR MODELO
// ===============================

document.getElementById('btnEntrenar').onclick = async () => {

    resultado.innerHTML = `
    <div class="alert alert-warning">
        ⏳ Entrenando el modelo...
    </div>
    `;

    try {

        const respuesta = await fetch('/ml/api/ml/entrenar/', {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrftoken
            },

            body: JSON.stringify({
                tipo_modelo: 'random_forest'
            })

        });

        const data = await respuesta.json();

        resultado.innerHTML = `

        <div class="card border-success shadow-sm">

            <div class="card-header bg-success text-white">
                Modelo entrenado correctamente
            </div>

            <div class="card-body">

                <table class="table table-bordered">

                    <tr>
                        <th>Modelo</th>
                        <td>${data.tipo_modelo}</td>
                    </tr>

                    <tr>
                        <th>Accuracy</th>
                        <td>${(data.accuracy*100).toFixed(2)}%</td>
                    </tr>

                    <tr>
                        <th>Precision</th>
                        <td>${(data.precision*100).toFixed(2)}%</td>
                    </tr>

                    <tr>
                        <th>Recall</th>
                        <td>${(data.recall*100).toFixed(2)}%</td>
                    </tr>

                    <tr>
                        <th>F1 Score</th>
                        <td>${(data.f1_score*100).toFixed(2)}%</td>
                    </tr>

                    <tr>
                        <th>Pacientes entrenamiento</th>
                        <td>${data.total_entrenamiento}</td>
                    </tr>

                    <tr>
                        <th>Pacientes prueba</th>
                        <td>${data.total_prueba}</td>
                    </tr>

                </table>

                <h5 class="mt-4">Importancia de Variables</h5>

                <table class="table table-striped">

                    <thead>

                        <tr>
                            <th>Variable</th>
                            <th>Importancia</th>
                        </tr>

                    </thead>

                    <tbody>

                    ${Object.entries(data.importancia_features).map(([k,v]) => `
                        <tr>
                            <td>${k}</td>
                            <td>${(v*100).toFixed(2)}%</td>
                        </tr>
                    `).join('')}

                    </tbody>

                </table>

            </div>

        </div>

        `;

    } catch (error) {

        resultado.innerHTML = `
        <div class="alert alert-danger">
            Error al entrenar el modelo.<br>
            ${error}
        </div>
        `;

    }

};



// ===============================
// PREDECIR TODOS
// ===============================

document.getElementById('btnPredecir').onclick = async () => {

    resultado.innerHTML = `
    <div class="alert alert-warning">
        ⏳ Generando predicciones...
    </div>
    `;

    try {

        const respuesta = await fetch('/ml/api/ml/predecir-todos/', {

            method: 'POST',

            headers: {
                'Content-Type':'application/json',
                'X-CSRFToken': csrftoken
            }

        });

        const data = await respuesta.json();

        resultado.innerHTML = `

        <div class="alert alert-success">

            <h4>Predicciones realizadas correctamente</h4>

            <hr>

            <p><strong>Pacientes procesados:</strong>
                ${data.pacientes_procesados ?? 'No disponible'}
            </p>

            <p><strong>Predicciones guardadas:</strong>
                ${data.predicciones_guardadas ?? 'No disponible'}
            </p>

            <p>
                ${data.mensaje ?? ''}
            </p>

        </div>

        `;

    } catch (error) {

        resultado.innerHTML = `
        <div class="alert alert-danger">
            Error al generar las predicciones.<br>
            ${error}
        </div>
        `;

    }

};

</script>

{% endblock %}
