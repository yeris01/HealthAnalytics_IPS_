{% extends 'base.html' %}
{% block title %}Reportes - HealthAnalytics IPS{% endblock %}
{% block page_title %}
<i class="bi bi-hospital me-2 text-primary"></i>Reportes
{% endblock %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-body">
        <p class="mb-0">
            Módulo de reportes disponible y conectado correctamente.
        </p>

        <div class="mt-3 d-flex gap-2">
            <a class="btn btn-primary"
               href="{% url 'reports:exportar_csv' %}">
                <i class="bi bi-file-earmark-spreadsheet"></i>
                Exportar CSV
            </a>

            <a class="btn btn-danger"
               href="{% url 'reports:exportar_pdf' %}">
                <i class="bi bi-file-earmark-pdf"></i>
                Exportar PDF
            </a>
        </div>
    </div>
</div>
{% endblock %}
